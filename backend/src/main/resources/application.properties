spring.application.name=smart-url-shortener

# 1. Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smart_url_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. JWT, CORS, & Server
smarturl.app.jwtSecret=${SMARTURL_APP_JWTSECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
smarturl.app.jwtExpirationMs=${SMARTURL_APP_JWTEXPIRATIONMS:86400000}
server.port=${PORT:8080}
smarturl.base-url=${SMARTURL_BASE_URL:http://localhost:8080}
smarturl.frontend-url=${SMARTURL_FRONTEND_URL:http://localhost:5173}
