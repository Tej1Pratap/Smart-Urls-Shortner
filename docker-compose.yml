services:
  db:
    image: mysql:8.0
    container_name: smart-url-db
    restart: always
    environment:
      MYSQL_DATABASE: smart_url_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: smart-url-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/smart_url_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SMARTURL_BASE_URL: http://localhost:8080
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: smart-url-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
